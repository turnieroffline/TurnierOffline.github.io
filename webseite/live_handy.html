<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Live · TurnierOffline</title>
<style>
:root{--or:#ff6b00;--bg:#060810;--s1:#0c1120;--s2:#121a2e;--s3:#1a2440;--tx:#e8edf8;--mu:#6b7fa0;--mu2:#9aaac8;--gn:#20d472;--rd:#f04060;--gd:#f0bc30;--F:'Impact','Arial Black',sans-serif;--B:system-ui,-apple-system,'Segoe UI',Arial,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--B);background:var(--bg);color:var(--tx);min-height:100vh;padding-bottom:70px;}
/* HEADER */
.mhdr{position:sticky;top:0;z-index:100;background:rgba(6,8,16,.97);border-bottom:2px solid var(--or);padding:0 16px;height:52px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(20px);}
.mhdr-t{font-family:var(--F);font-size:.82rem;letter-spacing:2px;color:var(--or);}
.mhdr-live{background:var(--gn);color:#000;font-family:var(--F);font-size:.5rem;letter-spacing:2px;padding:2px 8px;border-radius:4px;}
.mhdr-uhr{font-family:var(--F);font-size:.65rem;color:var(--mu2);margin-left:auto;}
/* SCORE */
.score-box{background:var(--s1);border-bottom:1px solid var(--s2);padding:20px 16px;text-align:center;}
.score-teams{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;}
.score-team{flex:1;font-family:var(--F);font-size:.9rem;letter-spacing:1px;}
.score-num{font-family:var(--F);font-size:3rem;letter-spacing:8px;color:var(--gd);line-height:1;}
.score-info{font-size:.72rem;color:var(--mu2);margin-top:6px;display:flex;align-items:center;justify-content:center;gap:6px;}
.dot-live{width:8px;height:8px;background:var(--gn);border-radius:50%;animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
/* CARDS */
.mcard{margin:12px;background:var(--s1);border:1px solid var(--s2);border-radius:12px;overflow:hidden;}
.mcard-title{font-family:var(--F);font-size:.6rem;letter-spacing:3px;color:var(--or);padding:10px 14px;border-bottom:1px solid var(--s2);}
/* EVENTS */
.ev-list{list-style:none;}
.ev-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:.8rem;color:var(--mu2);}
.ev-item:last-child{border:none;}
.ev-min{font-family:var(--F);color:var(--gd);min-width:28px;font-size:.75rem;}
/* TABELLE */
.tab-table{width:100%;border-collapse:collapse;}
.tab-table th{font-family:var(--F);font-size:.5rem;letter-spacing:2px;color:var(--or);padding:8px 10px;border-bottom:1px solid var(--s2);font-weight:normal;text-align:center;}
.tab-table td{padding:9px 10px;text-align:center;border-bottom:1px solid rgba(255,255,255,.04);font-size:.78rem;}
.tab-table td.tn{text-align:left;font-family:var(--F);font-size:.75rem;}
.tab-table tr.top1 td{background:rgba(255,107,0,.06);}
/* SPIELPLAN */
.plan-list{list-style:none;}
.plan-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:.78rem;}
.plan-row:last-child{border:none;}
.plan-zeit{font-family:var(--F);color:var(--gd);min-width:38px;font-size:.7rem;}
.plan-match{flex:1;color:var(--tx);}
.plan-match .vs{color:var(--mu);font-size:.7rem;}
.pbadge{font-family:var(--F);font-size:.55rem;padding:2px 7px;border-radius:4px;letter-spacing:1px;white-space:nowrap;}
.pb-live{background:var(--gn);color:#000;}
.pb-done{background:var(--s3);color:var(--mu2);}
.pb-next{background:rgba(255,107,0,.12);color:var(--or);border:1px solid rgba(255,107,0,.25);}
/* NAV */
.mnav{position:fixed;bottom:0;left:0;right:0;height:60px;background:rgba(6,8,16,.97);border-top:1px solid var(--s2);display:flex;backdrop-filter:blur(20px);z-index:100;}
.mnav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--mu);text-decoration:none;font-size:.6rem;letter-spacing:1px;transition:.15s;border:none;}
.mnav a.ac,.mnav a:hover{color:var(--or);}
.mnav .ico{font-size:1.2rem;}
/* TABS */
.tab-section{display:none;}
.tab-section.ac{display:block;}
/* STATUS */
.status-bar{background:var(--s2);border:1px solid var(--s3);border-radius:8px;padding:8px 12px;margin:12px;font-size:.7rem;color:var(--mu);display:flex;align-items:center;gap:8px;}
.offline-hint{display:none;background:rgba(240,64,96,.08);border:1px solid rgba(240,64,96,.2);border-radius:8px;padding:12px 14px;margin:12px;font-size:.78rem;color:var(--rd);text-align:center;}
</style>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body>

<header class="mhdr">
  <div class="mhdr-t" id="ev-name">🏆 TURNIEROFFLINE</div>
  <div class="mhdr-live" id="live-badge" style="display:none">LIVE</div>
  <div class="mhdr-uhr" id="uhr">--:--:--</div>
</header>

<div class="offline-hint" id="offline-hint">
  ⚠️ Keine Verbindung — zeige letzte bekannte Daten
</div>
<div class="status-bar" id="status-bar">
  🔄 Lade Daten…
</div>

<!-- SPIEL TAB -->
<div class="tab-section ac" id="tab-spiel">
  <div class="score-box" id="score-box">
    <div class="score-teams">
      <div class="score-team" id="t1name" style="text-align:left">–</div>
      <div class="score-team" id="t2name" style="text-align:right">–</div>
    </div>
    <div class="score-num" id="score">– : –</div>
    <div class="score-info" id="score-info">⏳ Warte auf Daten…</div>
  </div>
  <div class="mcard" id="events-card" style="display:none">
    <div class="mcard-title">EREIGNISSE</div>
    <ul class="ev-list" id="ev-list"></ul>
  </div>
</div>

<!-- TABELLE TAB -->
<div class="tab-section" id="tab-tabelle">
  <div class="mcard">
    <div class="mcard-title">TABELLE</div>
    <table class="tab-table">
      <thead><tr><th>#</th><th style="text-align:left">TEAM</th><th>SP</th><th>G</th><th>U</th><th>N</th><th>TORE</th><th>PKT</th></tr></thead>
      <tbody id="tab-body"></tbody>
    </table>
  </div>
</div>

<!-- SPIELPLAN TAB -->
<div class="tab-section" id="tab-plan">
  <div class="mcard">
    <div class="mcard-title">SPIELPLAN</div>
    <ul class="plan-list" id="plan-list"></ul>
  </div>
</div>

<nav class="mnav">
  <a href="#" class="ac" onclick="showTab('spiel',this)"><span class="ico">⚽</span>Spiel</a>
  <a href="#" onclick="showTab('tabelle',this)"><span class="ico">📊</span>Tabelle</a>
  <a href="#" onclick="showTab('plan',this)"><span class="ico">📅</span>Plan</a>
  <a href="live_tv.html"><span class="ico">📺</span>TV</a>
  <a href="index.html"><span class="ico">🏠</span>Start</a>
</nav>

<script>
const LIVE_JSON = './live.json';
let lastTs = 0;

function showTab(name, el) {
  document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('ac'));
  document.querySelectorAll('.mnav a').forEach(a => a.classList.remove('ac'));
  document.getElementById('tab-' + name).classList.add('ac');
  if (el) el.classList.add('ac');
  event?.preventDefault();
}

function iconFor(typ) {
  return {tor:'⚽',karte_gelb:'🟨',karte_rot:'🟥',wechsel:'🔄'}[typ] || '•';
}

function render(d) {
  // Header
  document.getElementById('ev-name').textContent = '🏆 ' + (d.event || 'TurnierOffline');

  // Score
  const s = d.spiel;
  if (s) {
    document.getElementById('t1name').textContent = s.team1;
    document.getElementById('t1name').style.color = s.farbe1 || 'var(--tx)';
    document.getElementById('t2name').textContent = s.team2;
    document.getElementById('t2name').style.color = s.farbe2 || 'var(--tx)';
    document.getElementById('score').textContent = s.tore1 + ' : ' + s.tore2;
    const info = document.getElementById('score-info');
    if (s.status === 'laufend') {
      document.getElementById('live-badge').style.display = '';
      info.innerHTML = '<span class="dot-live"></span> LIVE · ' + s.runde;
    } else if (s.status === 'beendet') {
      document.getElementById('live-badge').style.display = 'none';
      info.innerHTML = '✅ Beendet · ' + s.runde;
    } else {
      document.getElementById('live-badge').style.display = 'none';
      info.innerHTML = '⏳ Bald · ' + s.runde + (s.startzeit ? ' · ' + s.startzeit : '');
    }
  } else {
    document.getElementById('score').textContent = '– : –';
    document.getElementById('score-info').textContent = '😴 Gerade kein Spiel';
    document.getElementById('live-badge').style.display = 'none';
  }

  // Events
  const evCard = document.getElementById('events-card');
  const evList = document.getElementById('ev-list');
  if (d.events && d.events.length > 0) {
    evCard.style.display = '';
    evList.innerHTML = d.events.map(e =>
      `<li class="ev-item"><span class="ev-min">${e.minute}'</span><span>${iconFor(e.typ)}</span><span>${e.spieler ? e.spieler + ' – ' : ''}${e.team}</span></li>`
    ).join('');
  } else evCard.style.display = 'none';

  // Tabelle
  const tbody = document.getElementById('tab-body');
  tbody.innerHTML = (d.tabelle || []).map((r, i) =>
    `<tr class="${i===0?'top1':''}">
      <td>${i===0?'🥇':('#'+(i+1))}</td>
      <td class="tn" style="color:${r.farbe}">${r.name}</td>
      <td>${r.sp}</td>
      <td style="color:var(--gn)">${r.g??'-'}</td>
      <td>${r.u??'-'}</td>
      <td style="color:var(--rd)">${r.n??'-'}</td>
      <td>${r.tore}:${r.gegentore}</td>
      <td style="font-family:var(--F);color:var(--gd)">${r.pkt}</td>
    </tr>`
  ).join('');

  // Spielplan
  const planList = document.getElementById('plan-list');
  planList.innerHTML = (d.spielplan || []).map(s => {
    let badge = '';
    if (s.status==='laufend') badge = '<span class="pbadge pb-live">🔴 LIVE</span>';
    else if (s.status==='beendet') badge = `<span class="pbadge pb-done">${s.tore1}:${s.tore2}</span>`;
    else badge = '<span class="pbadge pb-next">⏳</span>';
    return `<li class="plan-row">
      <span class="plan-zeit">${s.zeit||s.runde}</span>
      <span class="plan-match"><span style="color:${s.farbe1}">${s.team1}</span> <span class="vs">vs</span> <span style="color:${s.farbe2}">${s.team2}</span></span>
      ${badge}
    </li>`;
  }).join('');

  // Status
  const ago = Math.round((Date.now()/1000 - (d.ts||0)) / 60);
  document.getElementById('status-bar').innerHTML =
    `✅ Zuletzt aktualisiert: vor ${ago < 1 ? 'gerade eben' : ago + ' Min.'}`;
}

async function fetchData() {
  try {
    const r = await fetch(LIVE_JSON + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (d.ts !== lastTs) { render(d); lastTs = d.ts; }
    document.getElementById('offline-hint').style.display = 'none';
  } catch(e) {
    document.getElementById('offline-hint').style.display = 'block';
    document.getElementById('status-bar').innerHTML = '⚠️ ' + e.message;
  }
  setTimeout(fetchData, 15000);
}

// Uhr
(function uhr() {
  const el = document.getElementById('uhr');
  const d = new Date(), p = n => String(n).padStart(2,'0');
  el.textContent = p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
  setTimeout(uhr, 1000);
})();

fetchData();
</script>
<div style="text-align:center;padding:16px;font-size:.6rem;color:#444;font-family:sans-serif;">© 2024–2026 Tobias · TurnierOffline V16 · <a href="lizenz/" style="color:#555">Lizenz</a></div>
</body>
</html>
