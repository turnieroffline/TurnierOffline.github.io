version: '3.8'

# ══════════════════════════════════════════════════════════════
# TurnierOffline V14 – Docker Compose
# Starten: docker compose up -d
# Stoppen: docker compose down
# ══════════════════════════════════════════════════════════════

services:
  turnieroffline:
    build:
      context: .
      dockerfile: Dockerfile
    image: turnieroffline:v14
    container_name: turnieroffline
    restart: unless-stopped
    ports:
      - "8080:8080"       # Haupt-Port: http://[IP]:8080
      - "8181:8080"       # Fallback-Port: http://[IP]:8181
    volumes:
      # Datenbank + Uploads bleiben nach Updates erhalten
      - turnieroffline_db:/app/database
      - turnieroffline_uploads:/app/uploads
    environment:
      - PHP_MEMORY_LIMIT=128M
      - PHP_MAX_EXECUTION_TIME=30
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  turnieroffline_db:
    driver: local
  turnieroffline_uploads:
    driver: local

# ══════════════════════════════════════════════════════════════
# Zugriff:
#   Admin:      http://[IP]:8080/admin/
#   Zuschauer:  http://[IP]:8080/mobile/
#   TV:         http://[IP]:8080/tv/
#
# IP ermitteln:
#   Windows:  ipconfig
#   Linux:    hostname -I
#   macOS:    ipconfig getifaddr en0
#   Android:  Einstellungen → WLAN → IP
# ══════════════════════════════════════════════════════════════
