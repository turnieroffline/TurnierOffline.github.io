<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TurnierOffline — Turniersystem für Vereine</title>
<meta name="description" content="Komplettes Turnier-Management auf deinem Gerät. Kein Internet, kein Abo, kein Server, nur Strom.">
<style>
@font-face{font-family:'TH';src:local('Impact'),local('Arial Black'),local('Franklin Gothic Heavy');font-weight:900;}
@font-face{font-family:'TB';src:local('Segoe UI'),local('Helvetica Neue'),local('Arial');font-weight:300 700;}
:root{
  --or:#ff6b00;--or2:#ff9340;--ord:rgba(255,107,0,.12);--orb:rgba(255,107,0,.05);
  --bg:#060810;--s1:#0c1120;--s2:#121a2e;--s3:#1a2440;--s4:#222e50;
  --tx:#e8edf8;--mu:#6b7fa0;--mu2:#9aaac8;
  --gn:#20d472;--gd:#f0bc30;--bl:#3b82f6;--rd:#f04060;
  --F:'TH',Impact,'Arial Black',sans-serif;
  --B:'TB','Segoe UI','Helvetica Neue',Arial,sans-serif;
  --rad:14px;
}

/* MOBILE FONT BASELINE - Samsung A34 5G & alle Geräte */
@media (max-width: 450px) {
  html { font-size: 112%; }
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--B);background:var(--bg);color:var(--tx);overflow-x:hidden;}
a{text-decoration:none;color:inherit;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--s4);}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:300;height:56px;padding:0 28px;display:flex;align-items:center;gap:8px;background:rgba(6,8,16,.9);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,107,0,.1);}
.nav-logo{font-family:var(--F);font-size:.95rem;letter-spacing:4px;color:var(--or);}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:2px;}
.nav-r a{font-size:.82rem;color:var(--mu2);padding:5px 10px;border-radius:8px;transition:.15s;}
.nav-r a:hover{color:var(--tx);background:rgba(255,255,255,.05);}
.nav-demo{background:var(--or)!important;color:#fff!important;font-family:var(--F);font-size:.78rem!important;letter-spacing:2px;padding:6px 14px!important;border-radius:8px;}
.nav-demo:hover{background:var(--or2)!important;}

/* HERO */
.hero{min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 24px 80px;text-align:center;position:relative;overflow:hidden;}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,107,0,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,107,0,.04) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse 80% 70% at 50% 40%,black 30%,transparent 100%);}
.hero-glow{position:absolute;top:20%;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(255,107,0,.13) 0%,transparent 70%);pointer-events:none;}
.hero-tag{font-size:.78rem;letter-spacing:4px;color:var(--or);background:var(--ord);border:1px solid rgba(255,107,0,.25);padding:5px 14px;border-radius:20px;margin-bottom:28px;display:inline-flex;align-items:center;gap:8px;}
.hero-tag::before{content:'';width:6px;height:6px;background:var(--gn);border-radius:50%;animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.15;}}
h1{font-family:var(--F);font-size:clamp(2.8rem,10vw,7rem);letter-spacing:6px;line-height:.95;margin-bottom:22px;}
h1 em{color:var(--or);font-style:normal;}
.hero-sub{font-size:clamp(.9rem,2vw,1.15rem);color:var(--mu2);max-width:540px;line-height:1.7;margin-bottom:36px;}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 26px;border-radius:10px;font-size:.85rem;font-family:var(--F);letter-spacing:2px;transition:.2s;white-space:nowrap;cursor:pointer;}
.btn-solid{background:var(--or);color:#fff;}
.btn-solid:hover{background:var(--or2);transform:translateY(-2px);}
.btn-line{border:1px solid rgba(255,255,255,.15);color:var(--mu2);}
.btn-line:hover{border-color:var(--or);color:var(--tx);transform:translateY(-2px);}
.btn-demo{background:rgba(255,107,0,.1);border:1px solid var(--or);color:var(--or);}
.btn-demo:hover{background:var(--ord);transform:translateY(-2px);}
.hero-scroll{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);font-size:.68rem;letter-spacing:3px;color:var(--mu);animation:float 2s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(6px);}}

/* STRIP */
.strip{background:var(--s1);border-top:1px solid rgba(255,107,0,.1);border-bottom:1px solid rgba(255,107,0,.1);padding:20px 0;display:flex;justify-content:center;flex-wrap:wrap;}
.si{padding:10px 32px;text-align:center;border-right:1px solid var(--s3);}
.si:last-child{border-right:none;}
.si-n{font-family:var(--F);font-size:1.6rem;letter-spacing:2px;color:var(--or);}
.si-l{font-size:.68rem;letter-spacing:3px;color:var(--mu);margin-top:2px;}

/* SECTION SHARED */
.sw{max-width:1100px;margin:0 auto;padding:0 24px;}
.sl{font-size:.68rem;letter-spacing:5px;color:var(--or);margin-bottom:10px;}
.sh{font-family:var(--F);font-size:clamp(1.6rem,5vw,2.8rem);letter-spacing:4px;margin-bottom:12px;}
.sp{color:var(--mu2);font-size:.95rem;line-height:1.8;max-width:560px;}

/* MOCKUP SECTION */
.demo-sec{padding:96px 24px;}
.demo-sec .sw{display:flex;flex-direction:column;align-items:center;text-align:center;gap:48px;}
.mock-pair{display:grid;grid-template-columns:1fr 1fr;gap:28px;width:100%;max-width:900px;}
.mock-cap{font-size:.68rem;letter-spacing:3px;color:var(--mu2);margin-bottom:8px;}
.tv-wrap{background:var(--s1);border:1px solid var(--s3);border-radius:10px;overflow:hidden;font-family:var(--F);}
.tv-bar{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--s2);border-bottom:2px solid var(--or);font-size:.62rem;letter-spacing:2px;}
.tv-bar-name{color:var(--or);letter-spacing:3px;}
.tv-body{display:grid;grid-template-columns:1fr auto;}
.tv-main{padding:10px;border-right:1px solid var(--s3);}
.tv-score-row{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:6px;}
.tv-team{font-size:.58rem;letter-spacing:1px;}
.tv-score{font-size:1.5rem;letter-spacing:8px;color:var(--gd);}
.tv-live{font-size:.52rem;color:var(--gn);letter-spacing:2px;margin-bottom:6px;display:flex;align-items:center;gap:4px;}
.tv-ev{font-size:.48rem;color:var(--mu2);padding:3px 0;border-bottom:1px solid var(--s3);}
.tv-side{padding:8px;min-width:100px;}
.tv-side-h{font-size:.48rem;letter-spacing:3px;color:var(--or);margin-bottom:6px;}
.tv-br-row{display:grid;grid-template-columns:1fr auto 1fr;gap:2px;margin-bottom:4px;font-size:.45rem;}
.tv-br-s{color:var(--gd);text-align:center;letter-spacing:2px;}
.tv-ticker{background:var(--bg);border-top:1px solid var(--s3);padding:4px 0;overflow:hidden;}
.ticker-inner{display:inline-block;white-space:nowrap;font-size:.45rem;color:var(--mu);animation:tick 20s linear infinite;padding-left:100%;}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.dot{width:6px;height:6px;background:var(--gn);border-radius:50%;display:inline-block;animation:blink 1s step-end infinite;}
.phone-outer{display:flex;justify-content:center;}
.phone-wrap{width:160px;background:var(--s1);border-radius:24px;border:1.5px solid var(--s3);overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.phone-pill{width:50px;height:4px;background:var(--s3);border-radius:2px;margin:8px auto 0;}
.phone-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--s2);border-bottom:2px solid var(--or);}
.phone-hdr-t{font-size:.55
